<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>TL-Agent</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: #e2e8f0;
}

/* 容器 */
.container {
    width: 760px;
    margin: 40px auto;
    display: flex;
    flex-direction: column;
    height: 90vh;

    backdrop-filter: blur(20px);
}

/* 聊天区 */
.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* 滚动条美化 */
.chat-box::-webkit-scrollbar {
    width: 6px;
}
.chat-box::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 10px;
}

/* 消息 */
.message {
    display: flex;
    margin-bottom: 18px;
}

/* 用户右侧 */
.user {
    justify-content: flex-end;
}

/* AI 左侧 */
.assistant {
    justify-content: flex-start;
}

/* 气泡基础 */
.bubble {
    max-width: 70%;
    padding: 14px 16px;
    border-radius: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    font-size: 14px;
    position: relative;
}

/* 用户气泡 */
.user .bubble {
    background: linear-gradient(135deg, #22c55e, #4ade80);
    color: #022c22;
    box-shadow: 0 0 12px rgba(34, 197, 94, 0.4);
}

/* AI气泡（科技感） */
.assistant .bubble {
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(148, 163, 184, 0.2);
    backdrop-filter: blur(10px);

    box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
}

/* 输入区域 */
.input-area {
    display: flex;
    padding: 12px;
    border-top: 1px solid rgba(148, 163, 184, 0.2);

    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(10px);
}

/* 输入框 */
input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(148, 163, 184, 0.2);

    background: rgba(2, 6, 23, 0.8);
    color: #e2e8f0;

    outline: none;
    transition: all 0.2s ease;
}

input::placeholder {
    color: #64748b;
}

input:focus {
    border: 1px solid #3b82f6;
    box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
}

/* 按钮 */
button {
    margin-left: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;

    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    color: white;
    font-weight: 500;

    cursor: pointer;
    transition: all 0.2s ease;
}

/* hover效果 */
button:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 12px rgba(56, 189, 248, 0.7);
}

/* 点击 */
button:active {
    transform: scale(0.96);
}
</style>
</head>

<body>

<div class="container">
    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input id="input" placeholder="问点什么，比如：武汉旅游推荐" />
        <button onclick="send()">发送</button>
    </div>
</div>

<script>
// 从 localStorage 读取已有的 session_id，没有则为 null
let session_id = localStorage.getItem("travel_session_id");

function saveSessionId(id) {
    session_id = id;
    localStorage.setItem("travel_session_id", id); // 👈 关键：保存到本地存储
}


function scrollToBottom() {
    const box = document.getElementById("chatBox");
    box.scrollTop = box.scrollHeight;
}

// ===== 创建气泡 =====
function createBubble(role, text="") {
    const chatBox = document.getElementById("chatBox");

    const wrapper = document.createElement("div");
    wrapper.className = "message " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;

    wrapper.appendChild(bubble);
    chatBox.appendChild(wrapper);

    scrollToBottom();
    return bubble;
}

// ===== 打字机效果（伪流式）=====
async function typeText(element, text) {
    element.innerText = "";
    for (let i = 0; i < text.length; i++) {
        element.innerText += text[i];
        await new Promise(r => setTimeout(r, 15)); // 控制速度
        scrollToBottom();
    }
}

// ===== 发送 =====
async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    createBubble("user", text);
    input.value = "";

    const assistantBubble = createBubble("assistant", "思考中...");

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                session_id: session_id, // 可能是 null，也可能是之前存的 ID
                messages: [{ role: "user", content: text }]
            })
        });

        const data = await response.json();
        saveSessionId(data.session_id); // 👈 用新函数保存

        await typeText(assistantBubble, data.reply);

    } catch (err) {
        // 尝试解析后端返回的 JSON 错误（如果有的话）
    if (err instanceof TypeError && err.message.includes('JSON')) {
        assistantBubble.innerText = "❌ 服务器返回了非预期内容，请联系管理员";
    } else {
        assistantBubble.innerText = "❌ " + (err.message || "未知错误");
    }
    }
}

// ===== 回车发送 =====
document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        send();
    }
});
</script>

</body>
</html>
