<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>TL-Agent</title>

<style>
body {
    margin: 0;
    background: #f7f7f8;
    font-family: -apple-system, BlinkMacSystemFont;
}

.container {
    width: 700px;
    margin: 30px auto;
    display: flex;
    flex-direction: column;
    height: 90vh;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.message {
    display: flex;
    margin-bottom: 15px;
}

.user {
    justify-content: flex-end;
}

.assistant {
    justify-content: flex-start;
}

.bubble {
    max-width: 70%;
    padding: 12px 15px;
    border-radius: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
}

.user .bubble {
    background: #4CAF50;
    color: white;
}

.assistant .bubble {
    background: white;
    border: 1px solid #ddd;
}

.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
    background: white;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    margin-left: 10px;
    padding: 12px 20px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input id="input" placeholder="问点什么，比如：武汉旅游推荐" />
        <button onclick="send()">发送</button>
    </div>
</div>

<script>
let session_id = null;

function scrollToBottom() {
    const box = document.getElementById("chatBox");
    box.scrollTop = box.scrollHeight;
}

// ===== 创建气泡 =====
function createBubble(role, text="") {
    const chatBox = document.getElementById("chatBox");

    const wrapper = document.createElement("div");
    wrapper.className = "message " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;

    wrapper.appendChild(bubble);
    chatBox.appendChild(wrapper);

    scrollToBottom();
    return bubble;
}

// ===== 打字机效果（伪流式）=====
async function typeText(element, text) {
    element.innerText = "";
    for (let i = 0; i < text.length; i++) {
        element.innerText += text[i];
        await new Promise(r => setTimeout(r, 15)); // 控制速度
        scrollToBottom();
    }
}

// ===== 发送 =====
async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    createBubble("user", text);
    input.value = "";

    const assistantBubble = createBubble("assistant", "思考中...");

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                session_id: session_id,
                messages: [
                    { role: "user", content: text }
                ]
            })
        });

        const data = await response.json();
        session_id = data.session_id;

        await typeText(assistantBubble, data.reply);

    } catch (err) {
        assistantBubble.innerText = "❌ 请求失败：" + err;
    }
}

// ===== 回车发送 =====
document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        send();
    }
});
</script>

</body>
</html>
